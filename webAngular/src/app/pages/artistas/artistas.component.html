<section class="hero" [style.--hero-img]="'url(' + heroImg + ')'">
  <div class="hero-bg"></div>
  <div class="hero-content">
    <div class="eyebrow">MS Group — Servicios</div>
    <h1>Artistas &amp;<br><span class="accent">Shows en Vivo</span></h1>
    <p>Conectamos tu evento con el talento perfecto para cualquier producción.</p>
    <a [href]="whatsappUrl" target="_blank" rel="noreferrer" class="btn-primary">
      Cotizar artistas →
    </a>
  </div>
</section>

<section class="detail">
  <div class="container">
    <div class="header">
      <div class="eyebrow">¿Qué incluye?</div>
      <h2><span class="icon">
        <i class="fa-solid fa-microphone" style="color: rgb(255, 255, 255);"></i>
      </span> Artistas &amp; Shows en Vivo</h2>
    </div>
    <div class="grid">
      <div class="item" *ngFor="let item of items">
        <span class="bullet">▸</span>
        <span>{{ item }}</span>
      </div>
    </div>
    <div class="actions">
      <a [href]="whatsappUrl" target="_blank" rel="noreferrer" class="btn-primary">
        💬 Cotizar por WhatsApp
      </a>
      <a routerLink="/" class="btn-back">← Volver al inicio</a>
    </div>
  </div>
</section>
